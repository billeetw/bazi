<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>測試：命書詳情 iframe + postMessage</title>
  <style>
    body { font-family: system-ui; background: #1e293b; color: #e2e8f0; margin: 0; padding: 1rem; }
    h1 { font-size: 1rem; }
    .layout { display: flex; gap: 1rem; height: 80vh; }
    .left { flex: 1; border: 1px solid #475569; border-radius: 8px; overflow: hidden; }
    .left iframe { width: 100%; height: 100%; border: 0; display: block; }
    .right { width: 280px; background: #334155; padding: 1rem; border-radius: 8px; font-size: 12px; }
    .log { margin-top: 0.5rem; max-height: 200px; overflow: auto; }
  </style>
</head>
<body>
  <h1>測試：左 iframe = lifebook-viewer，右 = 本頁 log。若左側出現章節即 postMessage 正常。</h1>
  <p>請先執行：<code>npm run build:lifebook-viewer</code>，然後 <code>npx serve . -p 8789</code>，再開此頁 <a href="http://localhost:8789/test-lifebook-detail-iframe.html" style="color:#93c5fd">http://localhost:8789/test-lifebook-detail-iframe.html</a></p>
  <div class="layout">
    <div class="left">
      <iframe id="viewerFrame" title="Viewer" src="/dist/lifebook-viewer.html"></iframe>
    </div>
    <div class="right">
      <div>postMessage log:</div>
      <div id="log" class="log"></div>
    </div>
  </div>
  <script>
    (function () {
      var logEl = document.getElementById('log');
      var iframe = document.getElementById('viewerFrame');
      function log(msg) {
        var p = document.createElement('p');
        p.textContent = new Date().toISOString().slice(11, 23) + ' ' + msg;
        logEl.appendChild(p);
        logEl.scrollTop = logEl.scrollHeight;
      }
      var minimalDoc = {
        meta: { schema_version: '1.0', generator_version: 'gpt-4.1', client_name: '測試', birth_info: '1990/1/1' },
        sections: {
          s01: { section_key: 's01', title: '第一章', importance_level: 'medium', structure_analysis: '測試內容', behavior_pattern: '', blind_spots: '', strategic_advice: '' }
        },
        weight_analysis: null,
        chart_json: null
      };
      window.addEventListener('message', function (e) {
        if (e.data === 'lifebook-viewer-ready') {
          log('收到 lifebook-viewer-ready');
          try {
            iframe.contentWindow.postMessage({ type: 'LIFEBOOK_DOC', doc: minimalDoc }, e.origin || '*');
            log('已送出 LIFEBOOK_DOC');
          } catch (err) {
            log('postMessage 失敗: ' + err.message);
          }
        }
      });
      log('已監聽 message，等待 iframe 送出 lifebook-viewer-ready');
    })();
  </script>
</body>
</html>
