# Worker：Vitest（含四化邊 validateTransformEdgeConsistency）；失敗則 CI 紅燈
name: Worker test

on:
  push:
    paths:
      - "worker/**"
      - ".github/workflows/worker-test.yml"
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/worker-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm run test:ci
